<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="manifest" href="/workout-timer/manifest.json" />
    <link rel="apple-touch-icon" href="/workout-timer/apple-touch-icon.png" />
    <title>Norwegian HIIT Timer</title>
  </head>
  <body>
    <div id="app" class="bg-neutral">
      <div id="phase-label">READY</div>
      <div id="timer-display">04:00</div>
      <div id="set-label"></div>
      <div class="controls">
        <button id="start-btn">START</button>
        <button id="pause-btn" style="display:none">PAUSE</button>
        <button id="reset-btn" style="display:none">RESET</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
