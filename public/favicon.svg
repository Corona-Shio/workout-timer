<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#1a1a2e"/>
  <!-- Timer circle -->
  <circle cx="50" cy="40" r="28" fill="none" stroke="#e94560" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="132 44" transform="rotate(-90 50 40)"/>
  <circle cx="50" cy="40" r="28" fill="none" stroke="#0f3460" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="44 132" stroke-dashoffset="-132" transform="rotate(-90 50 40)"/>
  <!-- Play triangle -->
  <polygon points="43,29 43,51 60,40" fill="#e0e0e0"/>
  <!-- HIIT text -->
  <text x="50" y="92" text-anchor="middle" font-size="22" font-weight="bold" font-family="sans-serif" fill="#e94560">HIIT</text>
</svg>
